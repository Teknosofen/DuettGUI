[platformio]
; Default to USB flashing. Switch to [env:ota] for wireless upload:
;   PlatformIO sidebar → Project Tasks → ota → Upload
;   or: pio run -e ota -t upload
default_envs = usb

; ── Shared settings ─────────────────────────────────────────────────────────
[base]
; pioarduino: arduino-esp32 3.x / IDF 5.x — required for OPI PSRAM + RGB LCD
platform     = https://github.com/pioarduino/platform-espressif32/releases/download/51.03.07/platform-espressif32.zip
board        = esp32-s3-devkitc-1
framework    = arduino
monitor_speed = 115200

; ESP32-S3 N4R8: 4 MB QIO flash + 8 MB OPI PSRAM
board_build.arduino.memory_type = qio_opi
board_build.flash_mode          = qio
board_upload.flash_size         = 4MB
board_build.partitions          = partitions_ota.csv
board_build.filesystem          = littlefs

; No USB CDC: GPIO19/20 are used by GT911 touch, not USB D+/D-.
; Serial maps to UART0 via CH340 bridge (shared with GPS — see docs).
build_flags =

lib_deps =
    lovyan03/LovyanGFX @ ^1.1.16
    adafruit/Adafruit GPS Library @ ^1.5.4
    h2zero/NimBLE-Arduino @ ^2.0.0

; ── USB (initial flash / recovery) ──────────────────────────────────────────
[env:usb]
extends      = base
upload_speed = 921600

; ── OTA (wireless, board must be running and on DuettGUI WiFi) ──────────────
[env:ota]
extends         = base
upload_protocol = espota
upload_port     = 192.168.4.1
; Must match OTA_PASSWORD in src/net/ota.h
upload_flags    = --auth=duett1964
