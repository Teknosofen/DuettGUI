[env:esp32-s3-devkitc-1]
; pioarduino platform: arduino-esp32 3.x / IDF 5.x
; Required for OPI PSRAM (qio_opi) + RGB LCD panel on ESP32-S3
platform     = https://github.com/pioarduino/platform-espressif32/releases/download/51.03.07/platform-espressif32.zip
board        = esp32-s3-devkitc-1
framework    = arduino
monitor_speed = 115200
upload_speed  = 921600

; --- ESP32-S3 memory: N4R8 = 4MB QIO flash + 8MB OPI PSRAM ---
board_build.arduino.memory_type = qio_opi
board_build.flash_mode          = qio
board_upload.flash_size         = 4MB
board_upload.maximum_size       = 4194304
board_build.partitions          = no_ota.csv

; --- Build flags ---
; No USB CDC: GPIO19/20 are used by GT911 touch (SDA/SCL), not USB D+/D-.
; Serial maps to UART0 (GPIO43 TX / GPIO44 RX) via the board's USB-UART bridge.
build_flags =

; --- Filesystem ---
board_build.filesystem = littlefs

; --- Libraries ---
lib_deps =
    lovyan03/LovyanGFX @ ^1.1.16
